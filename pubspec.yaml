name: npisirsem
description: "Frontend-only Flutter application for recipe suggestions."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo_npisirsem.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
